version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: sh /var/www/docker/entrypoint.sh
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_queue_worker
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    command: >
      sh -c "
      mkdir -p /var/log/supervisor &&
      supervisord -c /etc/supervisor/conf.d/supervisord.conf
      "
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: saas_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONT_PORT}:5173"
    command: sh /app/docker/entrypoint.sh

  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3307:3306"

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  websocket:
    image: node:20-alpine
    container_name: saas_ws
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
